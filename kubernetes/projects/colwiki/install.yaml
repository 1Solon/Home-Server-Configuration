---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app otterwiki
  namespace: flux-system
spec:
  components:
    - ../../../components/volsync
  targetNamespace: colwiki
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: volsync
      namespace: flux-system
  path: "./kubernetes/projects/colwiki/app"
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: otterwiki
      VOLSYNC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/volsync/colwiki/otterwiki
      VOLSYNC_SOURCE_PVC: otterwiki
      VOLSYNC_MOVER_APP_NAME: otterwiki
      VOLSYNC_MOVER_APP_INSTANCE: otterwiki
      VOLSYNC_SCHEDULE: "19 */6 * * *"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
        optional: false
