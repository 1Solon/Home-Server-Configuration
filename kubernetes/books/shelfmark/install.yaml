---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shelfmark
  namespace: flux-system
spec:
  components:
    - ../../../components/volsync
  targetNamespace: books
  commonMetadata:
    labels:
      app.kubernetes.io/name: shelfmark
  dependsOn:
    - name: volsync
      namespace: flux-system
  path: "./kubernetes/books/shelfmark/app"
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: shelfmark-config
      VOLSYNC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/volsync/books/shelfmark-config
      VOLSYNC_SOURCE_PVC: shelfmark-config
      VOLSYNC_MOVER_APP_NAME: shelfmark
      VOLSYNC_MOVER_APP_INSTANCE: shelfmark
      VOLSYNC_SCHEDULE: "33 */6 * * *"
      VOLSYNC_COPY_METHOD: Direct
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
        optional: false
