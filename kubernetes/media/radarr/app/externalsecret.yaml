---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: radarr-secret
    template:
      data:
        RADARR__AUTH__APIKEY: "{{ .RADARR__API_KEY }}"
  dataFrom:
    - extract:
        key: radarr
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr-db
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: radarr-db-secret
    template:
      engineVersion: v2
      data:
        RADARR__POSTGRES__MAINDB: &maindb radarr_main
        RADARR__POSTGRES__LOGDB: radarr_log
        RADARR__POSTGRES__HOST: postgres17-rw.databases.svc.cluster.local
        RADARR__POSTGRES__USER: &dbuser radarr
        RADARR__POSTGRES__PASSWORD: &dbpass '{{ .RADARR_POSTGRES_PASSWORD }}'
        RADARR__POSTGRES__PORT: '5432'

        # Postgres init
        INIT_POSTGRES_DBNAME: *maindb
        INIT_POSTGRES_HOST: postgres17-rw.databases.svc.cluster.local
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: radarr
