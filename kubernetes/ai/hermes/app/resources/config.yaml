---
model:
  provider: openai-codex
  default: gpt-5.5
  base_url: ""
  api_mode: chat_completions
toolsets:
  - hermes-cli
  - mcp-grafana
  - mcp-toolhive
  - memory
mcp_servers:
  agentmemory:
    command: npx
    args: ["-y", "@agentmemory/mcp"]
    env:
      AGENTMEMORY_URL: http://agentmemory.ai.svc.cluster.local:3111
      AGENTMEMORY_PROJECT: hermes
  grafana:
    url: http://mcp-grafana.observability.svc.cluster.local:8000/mcp
    timeout: 60
    connect_timeout: 30
  toolhive:
    url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
    timeout: 60
    connect_timeout: 30
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
memory:
  provider: agentmemory
  auto_migrate: true
  auto_summarize:
    threshold: 50
compression:
  enabled: true
display:
  tool_progress: true
  show_reasoning: true
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 3
  reasoning_effort: low
  service_tier: fast
streaming:
  enabled: true
security:
  redact_secrets: true
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
    - memory
