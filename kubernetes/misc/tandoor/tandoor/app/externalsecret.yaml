---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tandoor
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: tandoor-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        # App
        SECRET_KEY: "{{ .TANDOOR_SECRET_KEY }}"
        SOCIALACCOUNT_PROVIDERS: |-
          {
            "openid_connect": {
              "OAUTH_PKCE_ENABLED": true,
              "APPS": [
                {
                  "provider_id": "authentik",
                  "name": "Authentik",
                  "client_id": "{{ .TANDOOR_CLIENT_ID }}",
                  "secret": "{{ .TANDOOR_CLIENT_SECRET }}",
                  "settings": {
                    "server_url": "https://sso.${REMOTE_DOMAIN}/application/o/tandoor/.well-known/openid-configuration"
                  }
                }
              ]
            }
          }

        # Database
        POSTGRES_HOST: postgres17.databases.svc.cluster.local
        POSTGRES_PORT: "5432"
        POSTGRES_USER: &dbuser tandoor
        POSTGRES_PASSWORD: &dbpass "{{ .TANDOOR_POSTGRES_PASSWORD }}"
        POSTGRES_DB: &dbname tandoor

        # Postgres init
        INIT_POSTGRES_DBNAME: *dbname
        INIT_POSTGRES_HOST: postgres17.databases.svc.cluster.local
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: tandoor
