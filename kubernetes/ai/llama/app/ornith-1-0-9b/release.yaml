---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ornith-1-0-9b
spec:
  interval: 30m
  timeout: 60m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ornith-1-0-9b
                namespace: ai
              spec:
                progressDeadlineSeconds: 3600
  values:
    defaultPodOptions:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: kube5
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      ornith-1-0-9b:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/thetom/llama-cpp-turboquant
              tag: buildcache-cuda12-amd64@sha256:ca93236d65981460d4a3140f7f50e8d4cb20cefe2c31773622d0b0017b7d78ce
            args:
              - --hf-repo
              - deepreinforce-ai/Ornith-1.0-35B-GGUF
              - --hf-file
              - ornith-1.0-35b-Q4_K_M.gguf
              - --alias
              - Ornith-1.0-35B
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --verbosity
              - "4"
              - --reasoning-budget
              - "3000"
              - --reasoning-budget-message
              - "\n\nSYSTEM ERROR!: You have exceeded the reasoning budget. Thinking has been terminiated. You must answer now. "
              - --metrics
              - --no-mmap
              - --parallel
              - "1"
              - --n-gpu-layers
              - "999"
              - --n-cpu-moe
              - "30"
              - --cache-type-k
              - turbo4
              - cache-type-v
              - turbo3
            env:
              CUDA_VISIBLE_DEVICES: "0"
              LLAMA_CACHE: /models
            envFrom:
              - secretRef:
                  name: huggingface-secret
            ports:
              - name: http
                containerPort: &port 8080
                protocol: TCP
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                <<: *probes
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 540
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
                nvidia.com/gpu: 1
              limits:
                nvidia.com/gpu: 1
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    persistence:
      models:
        enabled: true
        type: nfs
        server: ${TRUENAS_IP}
        path: /mnt/STORAGE-01/Models
        globalMounts:
          - path: /models

    serviceMonitor:
      app:
        endpoints:
          - port: http
