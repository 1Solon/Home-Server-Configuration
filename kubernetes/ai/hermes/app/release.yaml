---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 600
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      hermes:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: *app
        initContainers:
          install-tools:
            dependsOn: init-config
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
            command:
              - /bin/bash
              - -c
              - |
                set -uo pipefail
                umask 022

                GH_VERSION=2.96.0
                GO_VERSION=1.26.5
                BREW_VERSION=6.0.12
                BREW_COMMIT=b48c7994b5f0eed7bef532efa63cb4e4f763887a
                LOCAL=/opt/data/.local
                BIN="$LOCAL/bin"
                mkdir -p "$BIN"

                warn() { printf 'install-tools: warning: %s\n' "$*" >&2; }

                case "$(uname -m)" in
                  x86_64)
                    ARCH=amd64
                    GH_SHA=83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60
                    GO_SHA=5c2c3b16caefa1d968a94c1daca04a7ca301a496d9b086e17ad77bb81393f053
                    ;;
                  aarch64|arm64)
                    ARCH=arm64
                    GH_SHA=06f86ec7103d41993b76cd78072f43595c34aaa56506d971d9860e67140bf909
                    GO_SHA=fe4789e92b1f33358680864bbe8704289e7bb5fc207d80623c308935bd696d49
                    ;;
                  *)
                    warn "unsupported architecture $(uname -m); leaving optional tools unchanged"
                    exit 0
                    ;;
                esac

                download_verified() {
                  url=$1
                  sha=$2
                  destination=$3
                  if ! curl -fsSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 180 --speed-time 30 --speed-limit 1024 "$url" -o "$destination"; then
                    warn "download failed: $url"
                    return 1
                  fi
                  if ! printf '%s  %s\n' "$sha" "$destination" | sha256sum -c -; then
                    warn "checksum failed: $destination"
                    rm -f "$destination"
                    return 1
                  fi
                }

                restore_previous() {
                  live=$1
                  previous=$2
                  tool=$3
                  if [ ! -e "$live" ] && [ -e "$previous" ]; then
                    if mv "$previous" "$live"; then
                      warn "$tool recovered interrupted promotion from $previous"
                    else
                      warn "$tool recovery failed: unable to restore $previous to $live"
                      return 1
                    fi
                  fi
                }

                promote_directory() {
                  live=$1
                  stage=$2
                  previous=$3
                  tool=$4
                  if [ -e "$previous" ] && ! rm -rf "$previous"; then
                    warn "$tool promotion failed: unable to remove stale backup $previous"
                    return 1
                  fi
                  if [ -e "$live" ] && ! mv "$live" "$previous"; then
                    warn "$tool promotion failed: unable to preserve $live at $previous"
                    return 1
                  fi
                  if mv "$stage" "$live"; then
                    if [ -e "$previous" ] && ! rm -rf "$previous"; then
                      warn "$tool installed but unable to remove backup $previous"
                    fi
                    return 0
                  fi
                  warn "$tool promotion failed; attempting rollback from $previous"
                  if [ -e "$previous" ]; then
                    if mv "$previous" "$live"; then
                      warn "$tool rollback restored $live"
                    else
                      warn "$tool rollback restoration failed: $previous was not restored to $live"
                    fi
                  else
                    warn "$tool rollback restoration failed: no backup exists at $previous"
                  fi
                  return 1
                }

                git_fetch() {
                  stage=$1
                  ref=$2
                  timeout --foreground --kill-after=10s 180s env GIT_TERMINAL_PROMPT=0 GIT_ASKPASS=/bin/false git -c protocol.version=2 -c http.lowSpeedLimit=1024 -c http.lowSpeedTime=30 -C "$stage" fetch -q --depth 1 origin "$ref"
                }

                gh_is_current() {
                  [ -x "$BIN/gh" ] || return 1
                  version=$("$BIN/gh" --version 2>/dev/null | head -n1)
                  case "$version" in
                    "gh version $GH_VERSION"|"gh version $GH_VERSION "*) return 0 ;;
                  esac
                  return 1
                }

                go_is_current() {
                  [ -x "$LOCAL/go/bin/go" ] || return 1
                  version=$("$LOCAL/go/bin/go" version 2>/dev/null)
                  case "$version" in
                    "go version go$GO_VERSION "*) return 0 ;;
                  esac
                  return 1
                }

                brew_is_current() {
                  [ -x "$LOCAL/homebrew/bin/brew" ] || return 1
                  [ "$(git -c safe.directory="$LOCAL/homebrew" -C "$LOCAL/homebrew" rev-parse HEAD 2>/dev/null || true)" = "$BREW_COMMIT" ] || return 1
                  status=$(git -c safe.directory="$LOCAL/homebrew" -C "$LOCAL/homebrew" status --porcelain 2>/dev/null) || return 1
                  [ -z "$status" ] || return 1
                  version=$(runuser -u hermes -- env HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_PREFIX="$LOCAL/homebrew" "$LOCAL/homebrew/bin/brew" --version 2>/dev/null | head -n1)
                  case "$version" in
                    "Homebrew $BREW_VERSION"|"Homebrew $BREW_VERSION "*) return 0 ;;
                  esac
                  return 1
                }

                install_gh() {
                  if gh_is_current; then
                    printf 'install-tools: gh %s already installed\n' "$GH_VERSION"
                    return 0
                  fi
                  archive="/tmp/gh_$${GH_VERSION}_$${ARCH}.tar.gz"
                  stage="/tmp/gh-$${GH_VERSION}"
                  rm -rf "$stage" "$archive"
                  mkdir -p "$stage"
                  download_verified "https://github.com/cli/cli/releases/download/v$${GH_VERSION}/gh_$${GH_VERSION}_linux_$${ARCH}.tar.gz" "$GH_SHA" "$archive" || return 1
                  tar -xzf "$archive" -C "$stage" || return 1
                  candidate="$stage/gh_$${GH_VERSION}_linux_$${ARCH}/bin/gh"
                  "$candidate" --version >/dev/null 2>&1 || return 1
                  install -m 0755 "$candidate" "$BIN/.gh.new" || return 1
                  chown 10000:10000 "$BIN/.gh.new" || { rm -f "$BIN/.gh.new"; return 1; }
                  mv -f "$BIN/.gh.new" "$BIN/gh" || return 1
                  printf 'install-tools: installed gh %s\n' "$GH_VERSION"
                }

                install_go() {
                  archive="/tmp/go$${GO_VERSION}.$${ARCH}.tar.gz"
                  stage="$LOCAL/.go.new"
                  previous="$LOCAL/.go.previous"
                  restore_previous "$LOCAL/go" "$previous" "Go" || return 1
                  if go_is_current; then
                    printf 'install-tools: go %s already installed\n' "$GO_VERSION"
                    return 0
                  fi
                  rm -rf "$stage" "$archive"
                  download_verified "https://go.dev/dl/go$${GO_VERSION}.linux-$${ARCH}.tar.gz" "$GO_SHA" "$archive" || return 1
                  mkdir -p "$stage"
                  tar -xzf "$archive" -C "$stage" --strip-components=1 || { rm -rf "$stage"; return 1; }
                  "$stage/bin/go" version 2>/dev/null | grep -Fx "go version go$${GO_VERSION} linux/$${ARCH}" || { rm -rf "$stage"; return 1; }
                  chown -R 10000:10000 "$stage" || { rm -rf "$stage"; return 1; }
                  promote_directory "$LOCAL/go" "$stage" "$previous" "Go" || { rm -rf "$stage"; return 1; }
                  printf 'install-tools: installed go %s\n' "$GO_VERSION"
                }

                install_brew() {
                  stage="$LOCAL/.homebrew.new"
                  previous="$LOCAL/.homebrew.previous"
                  restore_previous "$LOCAL/homebrew" "$previous" "Homebrew" || return 1
                  if brew_is_current; then
                    printf 'install-tools: Homebrew %s already installed\n' "$BREW_VERSION"
                    return 0
                  fi
                  rm -rf "$stage"
                  mkdir -p "$stage"
                  git -C "$stage" init -q || { rm -rf "$stage"; return 1; }
                  git -C "$stage" remote add origin https://github.com/Homebrew/brew.git || { rm -rf "$stage"; return 1; }
                  git_fetch "$stage" "$BREW_COMMIT" || { warn "Homebrew commit fetch failed"; rm -rf "$stage"; return 1; }
                  git_fetch "$stage" "refs/tags/$BREW_VERSION:refs/tags/$BREW_VERSION" || { warn "Homebrew tag fetch failed"; rm -rf "$stage"; return 1; }
                  git -C "$stage" checkout -q --detach FETCH_HEAD || { rm -rf "$stage"; return 1; }
                  [ "$(git -C "$stage" rev-parse HEAD)" = "$BREW_COMMIT" ] || { rm -rf "$stage"; return 1; }
                  version=$(HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_PREFIX="$stage" "$stage/bin/brew" --version 2>/dev/null | head -n1)
                  case "$version" in
                    "Homebrew $BREW_VERSION"|"Homebrew $BREW_VERSION "*) ;;
                    *) rm -rf "$stage"; return 1 ;;
                  esac
                  chown -R 10000:10000 "$stage" || { rm -rf "$stage"; return 1; }
                  promote_directory "$LOCAL/homebrew" "$stage" "$previous" "Homebrew" || { rm -rf "$stage"; return 1; }
                  printf 'install-tools: installed Homebrew %s\n' "$BREW_VERSION"
                }

                install_gh || warn "gh reconciliation failed; preserving any existing installation"
                install_go || warn "Go reconciliation failed; preserving any existing installation"
                install_brew || warn "Homebrew reconciliation failed; preserving any existing installation"
                exit 0
          init-config:
            image:
              repository: nousresearch/hermes-agent
              tag: &hermesTag v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
            command:
              - /bin/bash
              - -c
              - |
                set -euo pipefail
                umask 077

                rm -rf /staging/* /staging/.[!.]* /staging/..?* 2>/dev/null || true
                cp /desired/config.yaml /staging/config.yaml
                cp /desired/SOUL.md /staging/SOUL.md
                touch /staging/.env

                HERMES_HOME=/staging HOME=/staging /opt/hermes/.venv/bin/python - <<'PY'
                from hermes_cli.config import migrate_config
                migrate_config(interactive=False, quiet=False)
                PY

                /opt/hermes/.venv/bin/python - <<'PY'
                from pathlib import Path
                import yaml
                path = Path("/staging/config.yaml")
                data = yaml.safe_load(path.read_text(encoding="utf-8"))
                if not isinstance(data, dict):
                    raise SystemExit("migrated config is not a YAML mapping")
                if data.get("_config_version") != 33:
                    raise SystemExit("migrated config version is not 33")
                PY

                install -d -o 10000 -g 10000 -m 0750 /opt/data/workspace
                install -o 10000 -g 10000 -m 0600 /staging/config.yaml /opt/data/.config.yaml.new
                install -o 10000 -g 10000 -m 0600 /staging/SOUL.md /opt/data/.SOUL.md.new
                mv -f /opt/data/.config.yaml.new /opt/data/config.yaml
                mv -f /opt/data/.SOUL.md.new /opt/data/SOUL.md
                if [ -e /opt/data/.env ]; then
                  chown 0:0 /opt/data/.env
                  chmod 0600 /opt/data/.env
                  chown 10000:10000 /opt/data/.env
                else
                  install -o 10000 -g 10000 -m 0600 /dev/null /opt/data/.env
                fi
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: *hermesTag
            args: ["gateway", "run"]
            env:
              TZ: "${TZ}"
              HERMES_HOME: /opt/data
              GOPATH: /opt/data/go
              HOMEBREW_CELLAR: /opt/data/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /opt/data/.local/homebrew
              HOMEBREW_REPOSITORY: /opt/data/.local/homebrew
              PATH: /opt/hermes/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin:/opt/data/.local/go/bin:/opt/data/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              TERM: xterm-256color
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_PORT: &apiPort 8642
              API_SERVER_CORS_ORIGINS: "https://hermes.${LOCAL_DOMAIN}"
              HERMES_DASHBOARD: "true"
              HERMES_DASHBOARD_HOST: "0.0.0.0"
              HERMES_DASHBOARD_PORT: &dashboardPort 9119
              HERMES_DASHBOARD_OIDC_ISSUER: https://sso.${REMOTE_DOMAIN}/application/o/hermes/
              HERMES_DASHBOARD_PUBLIC_URL: https://hermes.${LOCAL_DOMAIN}
              AGENT_BROWSER_ARGS: "--no-sandbox,--disable-dev-shm-usage"
              FIRECRAWL_API_URL: https://api.firecrawl.dev
              SEARXNG_URL: http://searxng.ai.svc.cluster.local:8080
            envFrom:
              - secretRef:
                  name: *app
            ports:
              - name: api
                containerPort: *apiPort
                protocol: TCP
              - name: dashboard
                containerPort: *dashboardPort
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *apiPort
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - curl -fsS http://127.0.0.1:8642/health >/dev/null && curl -fsS -o /dev/null http://127.0.0.1:9119/
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - curl -fsS http://127.0.0.1:8642/health >/dev/null && curl -fsS -o /dev/null http://127.0.0.1:9119/
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 4Gi
    service:
      app:
        controller: *app
        ports:
          api:
            port: *apiPort
      dashboard:
        controller: *app
        ports:
          http:
            port: 9119

    route:
      app:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Hermes
          gethomepage.dev/description: Personal AI agent dashboard
          gethomepage.dev/group: AI
          gethomepage.dev/icon: https://cdn.jsdelivr.net/npm/@lobehub/icons-static-svg@latest/icons/hermesagent.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=hermes
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - "hermes.${LOCAL_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          hermes:
            app:
              - path: /opt/data
            init-config:
              - path: /opt/data
            install-tools:
              - path: /opt/data

      config-file:
        type: configMap
        name: hermes-config
        advancedMounts:
          hermes:
            init-config:
              - path: /desired/config.yaml
                subPath: config.yaml
                readOnly: true
              - path: /desired/SOUL.md
                subPath: SOUL.md
                readOnly: true

      config-staging:
        type: emptyDir
        advancedMounts:
          hermes:
            init-config:
              - path: /staging

      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          hermes:
            app:
              - path: /dev/shm

      tmpfs:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /tmp
            init-config:
              - path: /tmp
                subPath: init-config
            install-tools:
              - path: /tmp
                subPath: install-tools

    serviceAccount:
      hermes: {}
