---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app openwebui
  namespace: flux-system
spec:
  components:
    - ../../../components/volsync
  dependsOn:
    - name: volsync
      namespace: flux-system
  path: "./kubernetes/ai/openwebui/app"
  targetNamespace: ai
  prune: true
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 20m
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substitute:
      APP: open-webui-config
      VOLSYNC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/volsync/ai/open-webui-config
      VOLSYNC_SOURCE_PVC: open-webui-config
      VOLSYNC_MOVER_APP_NAME: open-webui
      VOLSYNC_MOVER_APP_INSTANCE: open-webui
      VOLSYNC_SCHEDULE: "15 */6 * * *"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
        optional: false
