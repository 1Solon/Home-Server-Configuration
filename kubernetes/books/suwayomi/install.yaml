---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app suwayomi
  namespace: flux-system
spec:
  components:
    - ../../../components/volsync
  targetNamespace: books
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: volsync
      namespace: flux-system
  path: "./kubernetes/books/suwayomi/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: suwayomi
      VOLSYNC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/volsync/manga/suwayomi
      VOLSYNC_SOURCE_PVC: suwayomi
      VOLSYNC_MOVER_APP_NAME: suwayomi
      VOLSYNC_MOVER_APP_INSTANCE: suwayomi
      VOLSYNC_SCHEDULE: "58 */6 * * *"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
        optional: false
