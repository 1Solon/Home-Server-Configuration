---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyseerr
  namespace: flux-system
spec:
  components:
    - ../../../components/volsync
  targetNamespace: home-media
  commonMetadata:
    labels:
      app.kubernetes.io/name: jellyseerr
  dependsOn:
    - name: volsync
      namespace: flux-system
  path: "./kubernetes/media/jellyseer/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: seerr-config
      VOLSYNC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/volsync/home-media/seerr-config
      VOLSYNC_SOURCE_PVC: seerr-config
      VOLSYNC_MOVER_APP_NAME: seerr
      VOLSYNC_MOVER_APP_INSTANCE: seerr
      VOLSYNC_SCHEDULE: "10 */6 * * *"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
        optional: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seerr-config-cache-volsync
  namespace: flux-system
spec:
  targetNamespace: home-media
  dependsOn:
    - name: jellyseerr
    - name: volsync
      namespace: flux-system
  path: "./kubernetes/components/volsync-standalone"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: seerr-config-cache
      VOLSYNC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/volsync/home-media/seerr-config-cache
      VOLSYNC_SOURCE_PVC: seerr-config-cache
      VOLSYNC_MOVER_APP_NAME: seerr
      VOLSYNC_MOVER_APP_INSTANCE: seerr
      VOLSYNC_SCHEDULE: "31 */6 * * *"
