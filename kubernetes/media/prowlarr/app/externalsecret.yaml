---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prowlarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: prowlarr-secret
    template:
      data:
        PROWLARR__AUTH__APIKEY: "{{ .PROWLARR__API_KEY }}"
  dataFrom:
    - extract:
        key: prowlarr
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prowlarr-db
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: prowlarr-db-secret
    template:
      engineVersion: v2
      data:
        PROWLARR__POSTGRES__MAINDB: &maindb prowlarr_main
        PROWLARR__POSTGRES__LOGDB: prowlarr_log
        PROWLARR__POSTGRES__HOST: postgres17-rw.databases.svc.cluster.local
        PROWLARR__POSTGRES__USER: &dbuser prowlarr
        PROWLARR__POSTGRES__PASSWORD: &dbpass '{{ .PROWLARR_POSTGRES_PASSWORD }}'
        PROWLARR__POSTGRES__PORT: '5432'

        # Postgres init
        INIT_POSTGRES_DBNAME: *maindb
        INIT_POSTGRES_HOST: postgres17-rw.databases.svc.cluster.local
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: prowlarr
