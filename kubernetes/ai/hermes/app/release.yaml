---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: *app
        initContainers:
          init-config:
            image:
              repository: docker.io/library/alpine
              tag: "3.23"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data/workspace
                cp /tmp/config.yaml /opt/data/config.yaml
                cp /tmp/SOUL.md /opt/data/SOUL.md
                chown -R 10000:10000 /opt/data/workspace
                chown 10000:10000 /opt/data/config.yaml /opt/data/SOUL.md
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.5.28@sha256:497d818208838f2cd3fb992b999450856acc725c6d97c55962289f1fd92b8b91
            args: ["gateway", "run"]
            env:
              TZ: "${TZ}"
              HERMES_HOME: /opt/data
              HOME: /opt/data
              GATEWAY_ALLOW_ALL_USERS: "true"
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_PORT: &apiPort 8642
              API_SERVER_CORS_ORIGINS: "https://hermes.${LOCAL_DOMAIN}"
            envFrom:
              - secretRef:
                  name: *app
            ports:
              - name: api
                containerPort: *apiPort
                protocol: TCP
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 4Gi
          dashboard:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.5.28@sha256:497d818208838f2cd3fb992b999450856acc725c6d97c55962289f1fd92b8b91
            args:
              - dashboard
              - --host
              - "0.0.0.0"
              - --port
              - "9119"
              - --insecure
              - --no-open
            env:
              TZ: "${TZ}"
              HERMES_HOME: /opt/dashboard-data
              HOME: /opt/dashboard-data
              GATEWAY_HEALTH_URL: http://localhost:8642
            ports:
              - name: dashboard
                containerPort: 9119
                protocol: TCP
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: *app
        ports:
          api:
            port: *apiPort
          dashboard:
            port: 9119

    route:
      app:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Hermes
          gethomepage.dev/description: Personal AI agent dashboard
          gethomepage.dev/group: AI
          gethomepage.dev/icon: https://cdn.jsdelivr.net/npm/@lobehub/icons-static-svg@latest/icons/hermesagent.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=hermes
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - "hermes.${LOCAL_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: app
                port: 9119

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          hermes:
            app:
              - path: /opt/data
            init-config:
              - path: /opt/data

      config-file:
        type: configMap
        name: hermes-config
        advancedMounts:
          hermes:
            init-config:
              - path: /tmp/config.yaml
                subPath: config.yaml
                readOnly: true
              - path: /tmp/SOUL.md
                subPath: SOUL.md
                readOnly: true
            dashboard:
              - path: /opt/dashboard-data/config.yaml
                subPath: config.yaml
                readOnly: true
              - path: /opt/dashboard-data/SOUL.md
                subPath: SOUL.md
                readOnly: true

      dashboard-data:
        type: emptyDir
        advancedMounts:
          hermes:
            dashboard:
              - path: /opt/dashboard-data

    serviceAccount:
      hermes: {}

    rbac:
      roles:
        # Broad read-only cluster access for diagnostics. Secrets are intentionally excluded.
        hermes-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources:
                - configmaps
                - endpoints
                - events
                - limitranges
                - namespaces
                - nodes
                - persistentvolumeclaims
                - persistentvolumes
                - pods
                - pods/log
                - resourcequotas
                - serviceaccounts
                - services
              verbs: &readOnlyVerbs ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources:
                - controllerrevisions
                - daemonsets
                - deployments
                - replicasets
                - statefulsets
              verbs: *readOnlyVerbs
            - apiGroups: ["batch"]
              resources:
                - cronjobs
                - jobs
              verbs: *readOnlyVerbs
            - apiGroups: ["networking.k8s.io"]
              resources:
                - ingressclasses
                - ingresses
                - networkpolicies
              verbs: *readOnlyVerbs
            - apiGroups: ["gateway.networking.k8s.io"]
              resources:
                - gatewayclasses
                - gateways
                - httproutes
                - referencegrants
              verbs: *readOnlyVerbs
            - apiGroups: ["storage.k8s.io"]
              resources:
                - csidrivers
                - csinodes
                - storageclasses
                - volumeattachments
              verbs: *readOnlyVerbs
            - apiGroups: ["autoscaling"]
              resources:
                - horizontalpodautoscalers
              verbs: *readOnlyVerbs
            - apiGroups: ["policy"]
              resources:
                - poddisruptionbudgets
              verbs: *readOnlyVerbs
            - apiGroups: ["coordination.k8s.io"]
              resources:
                - leases
              verbs: *readOnlyVerbs
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources:
                - clusterrolebindings
                - clusterroles
                - rolebindings
                - roles
              verbs: *readOnlyVerbs
            - apiGroups: ["apiextensions.k8s.io"]
              resources:
                - customresourcedefinitions
              verbs: *readOnlyVerbs
            - apiGroups: ["apiregistration.k8s.io"]
              resources:
                - apiservices
              verbs: *readOnlyVerbs
            - apiGroups: ["metrics.k8s.io"]
              resources:
                - nodes
                - pods
              verbs: *readOnlyVerbs
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources:
                - helmreleases
              verbs: *readOnlyVerbs
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources:
                - kustomizations
              verbs: *readOnlyVerbs
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources:
                - buckets
                - gitrepositories
                - helmcharts
                - helmrepositories
                - ocirepositories
              verbs: *readOnlyVerbs
            - apiGroups: ["notification.toolkit.fluxcd.io"]
              resources:
                - alerts
                - providers
                - receivers
              verbs: *readOnlyVerbs
            - apiGroups: ["external-secrets.io"]
              resources:
                - clustersecretstores
                - externalsecrets
                - secretstores
              verbs: *readOnlyVerbs
            - apiGroups: ["monitoring.coreos.com"]
              resources:
                - alertmanagers
                - podmonitors
                - probes
                - prometheuses
                - prometheusrules
                - servicemonitors
                - thanosrulers
              verbs: *readOnlyVerbs
            - apiGroups: ["snapshot.storage.k8s.io"]
              resources:
                - volumesnapshotclasses
                - volumesnapshotcontents
                - volumesnapshots
              verbs: *readOnlyVerbs
            - apiGroups: ["cert-manager.io"]
              resources:
                - certificates
                - certificaterequests
                - clusterissuers
                - issuers
              verbs: *readOnlyVerbs
            - apiGroups: ["acme.cert-manager.io"]
              resources:
                - challenges
                - orders
              verbs: *readOnlyVerbs
            - apiGroups: ["longhorn.io"]
              resources:
                - backups
                - recurringjobs
                - volumes
              verbs: *readOnlyVerbs
            - apiGroups: ["postgresql.cnpg.io"]
              resources:
                - backups
                - clusters
                - poolers
                - scheduledbackups
              verbs: *readOnlyVerbs
            - apiGroups: ["dragonflydb.io"]
              resources:
                - dragonflies
              verbs: *readOnlyVerbs
            - apiGroups: ["tailscale.com"]
              resources:
                - connectors
                - dnsconfigs
                - proxyclasses
                - proxygroups
              verbs: *readOnlyVerbs
            - apiGroups: ["node.k8s.io"]
              resources:
                - runtimeclasses
              verbs: *readOnlyVerbs
      bindings:
        hermes-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-read-all
          subjects:
            - identifier: *app
              serviceAccount: *app
