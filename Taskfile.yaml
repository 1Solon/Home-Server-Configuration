version: '3'

tasks:
  apply:
    desc: Apply all cluster configurations in reverse order (kube5 to kube1)
    cmds:
      - task: apply-kube5
      - task: apply-kube4
      - task: apply-kube3
      - task: apply-kube2
      - task: apply-kube1
    silent: false

  apply-kube5:
    desc: Drain kube5, apply config, and reboot
    cmds:
      - task: safe-apply
        vars:
          NODE: kube5
          IP: 192.168.1.105
          FILE: ./talos/clusterconfig/home-cluster-kube5.yaml
    silent: false

  apply-kube4:
    desc: Drain kube4, apply config, and reboot
    cmds:
      - task: safe-apply
        vars:
          NODE: kube4
          IP: 192.168.1.104
          FILE: ./talos/clusterconfig/home-cluster-kube4.yaml
    silent: false

  apply-kube3:
    desc: Drain kube3, apply config, and reboot
    cmds:
      - task: safe-apply
        vars:
          NODE: kube3
          IP: 192.168.1.103
          FILE: ./talos/clusterconfig/home-cluster-kube3.yaml
    silent: false

  apply-kube2:
    desc: Drain kube2, apply config, and reboot
    cmds:
      - task: safe-apply
        vars:
          NODE: kube2
          IP: 192.168.1.102
          FILE: ./talos/clusterconfig/home-cluster-kube2.yaml
    silent: false

  apply-kube1:
    desc: Drain kube1, apply config, and reboot
    cmds:
      - task: safe-apply
        vars:
          NODE: kube1
          IP: 192.168.1.101
          FILE: ./talos/clusterconfig/home-cluster-kube1.yaml
    silent: false

  safe-apply:
    internal: true
    cmds:
      - pwsh -NoProfile -File ./scripts/talos-safe-apply.ps1 -Node "{{.NODE}}" -Address "{{.IP}}" -Config "{{.FILE}}"
    silent: false

  gen:
    desc: Generate cluster configurations
    dir: talos
    cmds:
      - talhelper genconfig
    silent: false
