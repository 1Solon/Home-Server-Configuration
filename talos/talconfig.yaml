---
# renovate: datasource=custom.talos-factory depName=siderolabs/talos
talosVersion: v1.13.5

# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.36.2

clusterName: home-cluster
endpoint: https://192.168.5.100:6443
allowSchedulingOnMasters: true
additionalApiServerCertSans:
  - 192.168.5.100
cniConfig:
  name: none
patches:
  - |-
    machine:
      kubelet:
        extraMounts:
          - destination: /var/lib/longhorn
            type: bind
            source: /var/lib/longhorn
            options:
              - bind
              - rshared
              - rw
  - |-
    machine:
      features:
        hostDNS:
          enabled: true
          resolveMemberNames: true
  - |-
    cluster:
      proxy:
        disabled: true
  - |-
    machine:
      files:
        - op: overwrite
          path: /etc/nfsmount.conf
          permissions: 0o644
          content: |
            [ NFSMount_Global_Options ]
            nfsvers=4.2
            hard=True
            nconnect=16
            noatime=True
  - |-
    machine:
      sysctls:
        vm.nr_hugepages: "1024"
      kernel:
        modules:
          - name: nvme_tcp
          - name: vfio_pci
          - name: uio_pci_generic
  - |-
    apiVersion: v1alpha1
    kind: VolumeConfig
    name: EPHEMERAL
    provisioning:
      diskSelector:
        match: system_disk
      minSize: 100GB
      maxSize: 100GB
  - |-
    apiVersion: v1alpha1
    kind: RawVolumeConfig
    name: longhorn-csi
    provisioning:
      diskSelector:
        match: system_disk
      minSize: 100GB
      grow: true
controlPlane:
  patches:
    - |-
      machine:
        features:
          kubernetesTalosAPIAccess:
            enabled: true
            allowedRoles:
              - os:admin
            allowedKubernetesNamespaces:
              - kube-system
    - |-
      cluster:
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0
        etcd:
          extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381

nodes:
  - hostname: kube1
    ipAddress: 192.168.1.101
    controlPlane: true
    installDisk: /dev/nvme0n1
    nameservers:
      - 192.168.1.1
    networkInterfaces:
      - interface: end0
        addresses:
          - 192.168.1.101/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    schematic:
      overlay:
        name: turingrk1
        image: siderolabs/sbc-rockchip
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    patches:
      - |-
        machine:
          files:
            - path: /etc/cri/conf.d/20-customization.part
              op: create
              content: |
                [plugins."io.containerd.cri.v1.images"]
                  discard_unpacked_layers = false

  - hostname: kube2
    ipAddress: 192.168.1.102
    controlPlane: true
    installDisk: /dev/nvme0n1
    nameservers:
      - 192.168.1.1
    networkInterfaces:
      - interface: end0
        addresses:
          - 192.168.1.102/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    schematic:
      overlay:
        name: turingrk1
        image: siderolabs/sbc-rockchip
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    patches:
      - |-
        machine:
          files:
            - path: /etc/cri/conf.d/20-customization.part
              op: create
              content: |
                [plugins."io.containerd.cri.v1.images"]
                  discard_unpacked_layers = false

  - hostname: kube3
    ipAddress: 192.168.1.103
    controlPlane: true
    installDisk: /dev/nvme0n1
    nameservers:
      - 192.168.1.1
    networkInterfaces:
      - interface: end0
        addresses:
          - 192.168.1.103/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    schematic:
      overlay:
        name: turingrk1
        image: siderolabs/sbc-rockchip
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    patches:
      - |-
        machine:
          files:
            - path: /etc/cri/conf.d/20-customization.part
              op: create
              content: |
                [plugins."io.containerd.cri.v1.images"]
                  discard_unpacked_layers = false

  - hostname: kube4
    ipAddress: 192.168.1.104
    controlPlane: false
    installDisk: /dev/nvme0n1
    nameservers:
      - 192.168.1.1
    networkInterfaces:
      - interface: end0
        addresses:
          - 192.168.1.104/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    schematic:
      overlay:
        name: turingrk1
        image: siderolabs/sbc-rockchip
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
    patches:
      - |-
        machine:
          files:
            - path: /etc/cri/conf.d/20-customization.part
              op: create
              content: |
                [plugins."io.containerd.cri.v1.images"]
                  discard_unpacked_layers = false

  - hostname: kube5
    ipAddress: 192.168.1.105
    controlPlane: false
    installDisk: /dev/vda
    nameservers:
      - 192.168.1.1
    networkInterfaces:
      - interface: ens3
        addresses:
          - 192.168.1.105/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    schematic:
      customization:
        extraKernelArgs:
          - "pci=realloc"
          - "nvidia-drm.modeset=1"
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/nonfree-kmod-nvidia-production
            - siderolabs/nvidia-container-toolkit-production
            - siderolabs/qemu-guest-agent
            - siderolabs/util-linux-tools
    patches:
      - |-
        machine:
          kernel:
            modules:
              - name: nvidia
              - name: nvidia_uvm
              - name: nvidia_drm
              - name: nvidia_modeset
          sysctls:
            net.core.bpf_jit_harden: 1
            vm.max_map_count: 262144
      - |-
        machine:
          files:
            - path: /etc/cri/conf.d/20-customization.part
              op: create
              content: |
                [plugins."io.containerd.cri.v1.runtime"]
                  default_runtime_name = "nvidia"
                [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.nvidia]
                  runtime_type = "io.containerd.runc.v2"
                  [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.nvidia.options]
                    BinaryName = "/usr/local/bin/nvidia-container-runtime"
                [plugins."io.containerd.cri.v1.images"]
                  discard_unpacked_layers = false
