---
model:
  provider: openai-codex
  default: gpt-5.6-sol
web:
  backend: firecrawl
dashboard:
  theme: mono
  font: jetbrains-mono
toolsets:
  - hermes-cli
  - mcp-grafana
  - memory
  - terminal
mcp_servers:
  grafana:
    url: http://mcp-grafana.observability.svc.cluster.local:8000/mcp
    timeout: 60
    connect_timeout: 30
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
memory:
  auto_migrate: true
  auto_summarize:
    threshold: 50
approvals:
  destructive_slash_confirm: false
compression:
  enabled: true
  codex_gpt55_autoraise: false
  codex_gpt55_autoraise_notice: false
display:
  streaming: true
  tool_progress: true
  show_reasoning: true
  skin: mono
agent:
  reasoning_effort: high
streaming:
  enabled: true
security:
  redact_secrets: true
command_allowlist:
  - script execution via -e/-c flag
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
    - mcp-grafana
    - memory
    - terminal
