---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ornith
spec:
  interval: 30m
  timeout: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: kube5
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      ornith:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        initContainers:
          model-download:
            image:
              repository: docker.io/library/python
              tag: 3.14-slim@sha256:8e4071294d046d45b31a902e02a8560a45c351898513b66ec659ca39fd30d170
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail

                if [ ! -s "${MODEL_DEST}" ]; then
                  mkdir -p "$(dirname "${MODEL_DEST}")"
                  python - <<'PY'
                import os
                import urllib.request

                dest = os.environ["MODEL_DEST"]
                url = os.environ["MODEL_URL"]
                part = dest + ".part"
                token = os.environ.get("HF_TOKEN")

                headers = {}
                if token:
                    headers["Authorization"] = f"Bearer {token}"

                existing = os.path.getsize(part) if os.path.exists(part) else 0
                if existing:
                    headers["Range"] = f"bytes={existing}-"

                response = urllib.request.urlopen(urllib.request.Request(url, headers=headers), timeout=120)
                if existing and response.status != 206:
                    open(part, "wb").close()

                with open(part, "ab") as file:
                    while chunk := response.read(8 * 1024 * 1024):
                        file.write(chunk)

                os.replace(part, dest)
                PY
                  echo "${MODEL_NAME} download complete"
                else
                  echo "${MODEL_NAME} already downloaded, skipping"
                fi
            env:
              MODEL_DEST: /models/ornith/ornith-1.0-9b-Q6_K.gguf
              MODEL_NAME: Ornith-1.0-9B Q6_K
              MODEL_URL: https://huggingface.co/deepreinforce-ai/Ornith-1.0-9B-GGUF/resolve/main/ornith-1.0-9b-Q6_K.gguf
            envFrom:
              - secretRef:
                  name: huggingface-secret
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 8Gi
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda@sha256:0bf397ca34dcc7ac3b9365f0482768bce8cc982c06cc9294237c7d741a2def25
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - Ornith-1.0-9B
              - --model
              - /models/ornith/ornith-1.0-9b-Q6_K.gguf
              - --ctx-size
              - "131072"
              - --n-gpu-layers
              - "99"
              - --parallel
              - "1"
              - --reasoning
              - "off"
              - --cont-batching
              - --threads
              - "6"
              - --threads-batch
              - "12"
              - --metrics
              - --cache-ram
              - "0"
              - --mmap
            env:
              CUDA_VISIBLE_DEVICES: "0"
            ports:
              - name: http
                containerPort: &port 8080
                protocol: TCP
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                <<: *probes
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 360
            resources:
              requests:
                cpu: 250m
                memory: 4Gi
                nvidia.com/gpu: 1
              limits:
                memory: 12Gi
                nvidia.com/gpu: 1
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    persistence:
      models:
        enabled: true
        type: nfs
        server: ${TRUENAS_IP}
        path: /mnt/STORAGE-01/Model
        globalMounts:
          - path: /models

    serviceMonitor:
      app:
        endpoints:
          - port: http
