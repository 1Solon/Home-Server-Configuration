---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./release.yaml
configMapGenerator:
  - name: hermes-config
    files:
      - ./resources/config.yaml
      - ./resources/SOUL.md
      - agentmemory-plugin-init.py=./resources/agentmemory-plugin/__init__.py
      - agentmemory-plugin.yaml=./resources/agentmemory-plugin/plugin.yaml
generatorOptions:
  disableNameSuffixHash: true
