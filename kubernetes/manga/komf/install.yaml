---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app komf
  namespace: flux-system
spec:
  components:
    - ../../../components/volsync
  targetNamespace: manga
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: volsync
      namespace: flux-system
  path: "./kubernetes/manga/komf/app"
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: komf
      VOLSYNC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/volsync/manga/komf
      VOLSYNC_SOURCE_PVC: komf
      VOLSYNC_MOVER_APP_NAME: komf
      VOLSYNC_MOVER_APP_INSTANCE: komf
      VOLSYNC_SCHEDULE: "46 */6 * * *"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
        optional: false
