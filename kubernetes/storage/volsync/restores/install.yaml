---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-restores
  namespace: flux-system
spec:
  path: ./kubernetes/storage/volsync/restores/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: flux-system
    - name: volsync
      namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 60m
  suspend: true
