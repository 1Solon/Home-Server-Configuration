---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: audiobookshelf-config-restic
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: audiobookshelf-config-restic
    template:
      engineVersion: v2
      data:
        RESTIC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/volsync/books/audiobookshelf-config
        RESTIC_PASSWORD: "{{ .RESTIC_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
        AWS_DEFAULT_REGION: us-east-1
  dataFrom:
    - extract:
        key: volsync-garage
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: audiobookshelf-config
spec:
  sourcePVC: audiobookshelf-config
  trigger:
    schedule: "17 */6 * * *"
  restic:
    repository: audiobookshelf-config-restic
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn
    cacheStorageClassName: longhorn
    pruneIntervalDays: 7
    cacheCapacity: 1Gi
    retain:
      hourly: 4
      daily: 7
      weekly: 4
      monthly: 3
