---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app all-minilm-l6-v2
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      all-minilm-l6-v2:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server
            args:
              - --hf-repo
              - second-state/All-MiniLM-L6-v2-Embedding-GGUF
              - --hf-file
              - all-MiniLM-L6-v2-Q8_0.gguf
              - --alias
              - sentence-transformers/all-MiniLM-L6-v2
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --embedding
              - --pooling
              - mean
              - --ctx-size
              - "8192"
              - --parallel
              - "1"
              - --cont-batching
              - --batch-size
              - "8192"
              - --ubatch-size
              - "8192"
              - --threads
              - "6"
              - --threads-batch
              - "12"
              - --metrics
              - --mmap
              - --cache-ram
              - "0"
            env:
              LLAMA_CACHE: /models
            envFrom:
              - secretRef:
                  name: huggingface-secret
            ports:
              - name: http
                containerPort: &port 8080
                protocol: TCP
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                <<: *probes
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 360
            resources:
              requests:
                cpu: 250m
                memory: 2Gi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    persistence:
      models:
        enabled: true
        type: nfs
        server: ${TRUENAS_IP}
        path: /mnt/STORAGE-01/Models
        globalMounts:
          - path: /models

    serviceMonitor:
      app:
        endpoints:
          - port: http
