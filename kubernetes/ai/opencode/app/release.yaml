---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opencode
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      opencode:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: 1.17.13@sha256:8e1744b36fb0b828591094db8905e5e6fc9fa1f242606923e9ae6132d6d15740
            command:
              - /bin/sh
              - -c
              - |
                cd /workspace
                exec opencode serve --hostname 0.0.0.0 --port 4096
            env:
              HOME: /config
              OPENCODE_SERVER_USERNAME: opencode
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /global/health
                    port: 4096
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probe
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 4096

    route:
      app:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: OpenCode
          gethomepage.dev/description: Headless OpenCode API server
          gethomepage.dev/group: AI
          gethomepage.dev/icon: mdi-robot
          gethomepage.dev/pod-selector: app.kubernetes.io/name=opencode
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - "opencode.${LOCAL_DOMAIN}"
        rules:
          - backendRefs:
              - port: *port
                name: *app

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /config

      workspace:
        enabled: true
        type: nfs
        server: ${TRUENAS_IP}
        path: /mnt/STORAGE-01/Code
        globalMounts:
          - path: /workspace

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
