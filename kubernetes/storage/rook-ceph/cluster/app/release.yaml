---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 30m
  chart:
    spec:
      chart: rook-ceph-cluster
      version: v1.20.1
      sourceRef:
        kind: HelmRepository
        name: rook-ceph
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    operatorNamespace: rook-ceph
    toolbox:
      enabled: true
    monitoring:
      enabled: true
      createPrometheusRules: true
    cephClusterSpec:
      dataDirHostPath: /var/lib/rook
      network:
        provider: host
        addressRanges:
          public:
            - 192.168.1.0/24
      cephConfig:
        mon:
          # RK1 nodes can flap under storage/network pressure; delay automatic
          # OSD out marking so brief interruptions do not trigger heavy recovery.
          mon_osd_down_out_interval: "21600"
        osd:
          osd_memory_target: "2147483648"
          osd_mclock_profile: high_client_ops
          osd_max_scrubs: "1"
          osd_scrub_begin_hour: "2"
          osd_scrub_end_hour: "6"
          osd_max_backfills: "1"
          osd_recovery_max_active: "1"
          osd_recovery_sleep: "0.1"
      mon:
        count: 3
        allowMultiplePerNode: false
      mgr:
        count: 2
        allowMultiplePerNode: false
        modules:
          - name: rook
            enabled: true
      dashboard:
        enabled: true
        ssl: false
      crashCollector:
        disable: false
      logCollector:
        enabled: true
        periodicity: daily
        maxLogSize: 500M
      cleanupPolicy:
        confirmation: ""
        sanitizeDisks:
          method: quick
          dataSource: zero
          iteration: 1
        allowUninstallWithVolumes: false
      resources:
        mgr:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
        mon:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 2Gi
        osd:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            memory: 3Gi
        prepareosd:
          requests:
            cpu: 100m
            memory: 50Mi
      storage:
        useAllNodes: true
        useAllDevices: false
        devicePathFilter: "^/dev/disk/by-partlabel/r-longhorn-csi$"
      disruptionManagement:
        managePodBudgets: true
        osdMaintenanceTimeout: 30
      healthCheck:
        daemonHealth:
          mon:
            disabled: false
            interval: 45s
          osd:
            disabled: false
            interval: 60s
          status:
            disabled: false
            interval: 60s
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
          enableRBDStats: true
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          mountOptions:
            - discard
          parameters:
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: true
      deletionPolicy: Delete
    cephFileSystems: []
    cephFileSystemVolumeSnapshotClass:
      enabled: false
    cephObjectStores: []
  timeout: 30m
