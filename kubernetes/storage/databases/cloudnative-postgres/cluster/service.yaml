---
apiVersion: v1
kind: Service
metadata:
  name: postgres17
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: postgres17
    cnpg.io/instanceRole: primary
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: pgvector17
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: pgvector17
    cnpg.io/instanceRole: primary
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432