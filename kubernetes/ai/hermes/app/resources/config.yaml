---
model:
  provider: custom
  default: Ornith-1.0-35B
  base_url: http://ornith-1-0-35b.ai.svc.cluster.local:8080/v1
  api_key: ""
  context_length: 65536
  api_mode: chat_completions
web:
  backend: firecrawl
dashboard:
  theme: mono
  font: jetbrains-mono
toolsets:
  - hermes-cli
  - mcp-grafana
  - mcp-toolhive
  - memory
  - terminal
mcp_servers:
  agentmemory:
    command: /bin/sh
    args:
      - -c
      - |
        AGENTMEMORY_SECRET="$(sed -n 's/^AGENTMEMORY_SECRET=//p' /opt/data/.env | tail -n 1)"
        export AGENTMEMORY_SECRET
        exec npx -y @agentmemory/mcp
    env:
      AGENTMEMORY_URL: http://agentmemory.ai.svc.cluster.local:3111
      AGENTMEMORY_PROJECT: hermes
      AGENTMEMORY_INJECT_CONTEXT: "true"
  grafana:
    url: http://mcp-grafana.observability.svc.cluster.local:8000/mcp
    timeout: 60
    connect_timeout: 30
  toolhive:
    url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
    timeout: 60
    connect_timeout: 30
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
memory:
  provider: agentmemory
  auto_migrate: true
  auto_summarize:
    threshold: 50
compression:
  enabled: true
  codex_gpt55_autoraise: false
  codex_gpt55_autoraise_notice: false
display:
  streaming: true
  tool_progress: true
  show_reasoning: true
  skin: mono
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 3
  reasoning_effort: high
  service_tier: fast
streaming:
  enabled: true
security:
  redact_secrets: true
command_allowlist:
  - script execution via -e/-c flag
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
    - mcp-grafana
    - mcp-toolhive
    - memory
    - terminal
