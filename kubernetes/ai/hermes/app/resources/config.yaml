---
model:
  provider: openai-codex
  default: gpt-5.5
  base_url: ""
  api_mode: chat_completions
toolsets:
  - hermes-cli
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
memory:
  auto_migrate: true
  auto_summarize:
    threshold: 50
compression:
  enabled: true
display:
  tool_progress: true
  show_reasoning: true
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 3
  reasoning_effort: low
streaming:
  enabled: false
security:
  redact_secrets: true
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
