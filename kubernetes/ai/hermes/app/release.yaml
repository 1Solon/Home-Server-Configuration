---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 600
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      hermes:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: *app
        initContainers:
          install-tools:
            dependsOn: init-config
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
            command:
              - /bin/sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data/.local/bin

                rm -f /opt/data/.local/bin/hermes /opt/data/.local/bin/docker

                if [ ! -f /opt/data/.local/bin/gh ]; then
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /opt/data/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi

                if [ ! -f /opt/data/.local/go/bin/go ]; then
                  rm -rf /opt/data/.local/go
                  cd /tmp
                  curl -fsSL https://go.dev/dl/go1.23.5.linux-amd64.tar.gz -o go.tar.gz
                  tar xzf go.tar.gz
                  mv go /opt/data/.local/
                  rm -rf go.tar.gz
                fi

                if [ ! -f /opt/data/.local/homebrew/bin/brew ]; then
                  export HOMEBREW_PREFIX=/opt/data/.local/homebrew
                  mkdir -p "$HOMEBREW_PREFIX"
                  git clone --depth 1 https://github.com/Homebrew/brew "$HOMEBREW_PREFIX"
                fi
          install-firecrawl-python:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                if ! PYTHONPATH=/opt/data/python-packages python - <<'PY'; then
                import importlib.util
                raise SystemExit(0 if importlib.util.find_spec("firecrawl") else 1)
                PY
                  uv pip install --target /opt/data/python-packages firecrawl-py==4.17.0
                fi
          init-config:
            image:
              repository: nousresearch/hermes-agent
              tag: &hermesTag v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
            command:
              - /bin/bash
              - -c
              - |
                set -euo pipefail
                umask 077

                rm -rf /staging/* /staging/.[!.]* /staging/..?* 2>/dev/null || true
                cp /desired/config.yaml /staging/config.yaml
                cp /desired/SOUL.md /staging/SOUL.md
                touch /staging/.env

                HERMES_HOME=/staging HOME=/staging /opt/hermes/.venv/bin/python - <<'PY'
                from hermes_cli.config import migrate_config
                migrate_config(interactive=False, quiet=False)
                PY

                /opt/hermes/.venv/bin/python - <<'PY'
                from pathlib import Path
                import yaml
                path = Path("/staging/config.yaml")
                data = yaml.safe_load(path.read_text(encoding="utf-8"))
                if not isinstance(data, dict):
                    raise SystemExit("migrated config is not a YAML mapping")
                if data.get("_config_version") != 33:
                    raise SystemExit("migrated config version is not 33")
                PY

                install -d -o 10000 -g 10000 -m 0750 /opt/data/workspace
                install -o 10000 -g 10000 -m 0600 /staging/config.yaml /opt/data/.config.yaml.new
                install -o 10000 -g 10000 -m 0600 /staging/SOUL.md /opt/data/.SOUL.md.new
                mv -f /opt/data/.config.yaml.new /opt/data/config.yaml
                mv -f /opt/data/.SOUL.md.new /opt/data/SOUL.md
                if [ -e /opt/data/.env ]; then
                  chown 0:0 /opt/data/.env
                  chmod 0600 /opt/data/.env
                  chown 10000:10000 /opt/data/.env
                else
                  install -o 10000 -g 10000 -m 0600 /dev/null /opt/data/.env
                fi
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: *hermesTag
            args: ["gateway", "run"]
            env:
              TZ: "${TZ}"
              HERMES_HOME: /opt/data
              HOME: /opt/data
              PYTHONPATH: /opt/data/python-packages
              GOPATH: /opt/data/go
              HOMEBREW_CELLAR: /opt/data/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /opt/data/.local/homebrew
              HOMEBREW_REPOSITORY: /opt/data/.local/homebrew
              PATH: /opt/hermes/.venv/bin:/opt/data/.local/bin:/opt/data/.local/go/bin:/opt/data/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_PORT: &apiPort 8642
              API_SERVER_CORS_ORIGINS: "https://hermes.${LOCAL_DOMAIN}"
              AGENT_BROWSER_ARGS: "--no-sandbox,--disable-dev-shm-usage"
              FIRECRAWL_API_URL: https://api.firecrawl.dev
              SEARXNG_URL: http://searxng.ai.svc.cluster.local:8080
            envFrom:
              - secretRef:
                  name: *app
            ports:
              - name: api
                containerPort: *apiPort
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *apiPort
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *apiPort
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 4Gi
          dashboard:
            image:
              repository: nousresearch/hermes-agent
              tag: *hermesTag
            args:
              - dashboard
              - --host
              - 0.0.0.0
              - --port
              - "9119"
              - --no-open
            env:
              TZ: "${TZ}"
              HERMES_HOME: /opt/data
              HOME: /opt/data
              GATEWAY_HEALTH_URL: http://localhost:8642
              HERMES_DASHBOARD_OIDC_ISSUER: https://sso.${REMOTE_DOMAIN}/application/o/hermes/
              HERMES_DASHBOARD_PUBLIC_URL: https://hermes.${LOCAL_DOMAIN}
            envFrom:
              - secretRef:
                  name: *app
            ports:
              - name: dashboard
                containerPort: 9119
                protocol: TCP
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: *app
        ports:
          api:
            port: *apiPort
      dashboard:
        controller: *app
        ports:
          http:
            port: 9119

    route:
      app:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Hermes
          gethomepage.dev/description: Personal AI agent dashboard
          gethomepage.dev/group: AI
          gethomepage.dev/icon: https://cdn.jsdelivr.net/npm/@lobehub/icons-static-svg@latest/icons/hermesagent.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=hermes
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - "hermes.${LOCAL_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          hermes:
            app:
              - path: /opt/data
            dashboard:
              - path: /opt/data
            init-config:
              - path: /opt/data
            install-firecrawl-python:
              - path: /opt/data
            install-tools:
              - path: /opt/data

      config-file:
        type: configMap
        name: hermes-config
        advancedMounts:
          hermes:
            init-config:
              - path: /desired/config.yaml
                subPath: config.yaml
                readOnly: true
              - path: /desired/SOUL.md
                subPath: SOUL.md
                readOnly: true

      config-staging:
        type: emptyDir
        advancedMounts:
          hermes:
            init-config:
              - path: /staging
      python-packages:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /opt/data/python-packages
            install-firecrawl-python:
              - path: /opt/data/python-packages

      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          hermes:
            app:
              - path: /dev/shm

      tmpfs:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /tmp
            dashboard:
              - path: /tmp
                subPath: dashboard
            install-firecrawl-python:
              - path: /tmp
                subPath: install-firecrawl-python
            install-tools:
              - path: /tmp
                subPath: install-tools
            init-config:
              - path: /tmp
                subPath: init-config

    serviceAccount:
      hermes: {}
