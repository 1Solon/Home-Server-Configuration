---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prowlarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: prowlarr-secret
    template:
      data:
        PROWLARR__AUTH__APIKEY: "{{ .PROWLARR__API_KEY }}"
  dataFrom:
    - extract:
        key: prowlarr
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prowlarr-db
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: prowlarr-db-secret
    template:
      engineVersion: v2
      data:
        PROWLARR__POSTGRES__MAINDB: prowlarr_main
        PROWLARR__POSTGRES__LOGDB: prowlarr_log
        PROWLARR__POSTGRES__HOST: postgres17.databases.svc.cluster.local
        PROWLARR__POSTGRES__USER: '{{ .POSTGRES_SUPER_USER }}'
        PROWLARR__POSTGRES__PASSWORD: '{{ .POSTGRES_SUPER_PASS }}'
        PROWLARR__POSTGRES__PORT: '5432'
  dataFrom:
    - extract:
        key: cloudnative-pg
