---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 600
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      hermes:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: *app
        initContainers:
          install-tools:
            dependsOn: init-config
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
            command:
              - /bin/bash
              - -c
              - |
                set -euo pipefail
                GH=2.96.0 GO=1.26.5 BREW=6.0.12 P=/opt/data/.local
                case "$(uname -m)" in
                  x86_64) A=amd64 ;;
                  aarch64|arm64) A=arm64 ;;
                  *) echo "unsupported architecture" >&2; exit 1 ;;
                esac
                mkdir -p "$P/bin"

                if [ ! -x "$P/bin/gh" ]; then
                  G=gh_"$GH"_linux_"$A"
                  curl -fsSL "https://github.com/cli/cli/releases/download/v$GH/$G.tar.gz" | tar xOz "$G/bin/gh" >/tmp/gh
                  install -o 10000 -g 10000 -m 755 /tmp/gh "$P/bin/gh"
                fi

                if [ ! -x "$P/go/bin/go" ]; then
                  rm -rf "$P/.go" "$P/go"
                  mkdir "$P/.go"
                  curl -fsSL "https://go.dev/dl/go$GO.linux-$A.tar.gz" | tar xz -C "$P/.go" --strip-components=1
                  chown -R 10000:10000 "$P/.go"
                  mv "$P/.go" "$P/go"
                fi

                if [ ! -x "$P/homebrew/bin/brew" ]; then
                  rm -rf "$P/.homebrew" "$P/homebrew"
                  git clone -q --depth 1 --branch "$BREW" https://github.com/Homebrew/brew.git "$P/.homebrew"
                  chown -R 10000:10000 "$P/.homebrew"
                  mv "$P/.homebrew" "$P/homebrew"
                fi
          init-config:
            image:
              repository: nousresearch/hermes-agent
              tag: &hermesTag v2026.7.20@sha256:f7b35053268f532f98955195c909f15a230470fbcbdacaa9fdecb95707dad04a
            command:
              - /bin/bash
              - -c
              - |
                set -eu
                cp /desired/{config.yaml,SOUL.md} /staging/
                touch /staging/.env
                HERMES_HOME=/staging HOME=/staging /opt/hermes/.venv/bin/python -c 'from hermes_cli.config import migrate_config; migrate_config(interactive=False,quiet=False)'
                install -d -o 10000 -g 10000 -m 750 /opt/data/workspace
                install -o 10000 -g 10000 -m 600 /staging/{config.yaml,SOUL.md} /opt/data/
                chown 0:0 /opt/data/.env 2>/dev/null || touch /opt/data/.env
                chmod 600 /opt/data/.env
                chown 10000:10000 /opt/data/.env
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: *hermesTag
            args: ["gateway", "run"]
            env:
              TZ: "${TZ}"
              HERMES_HOME: /opt/data
              GOPATH: /opt/data/go
              HOMEBREW_CELLAR: /opt/data/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /opt/data/.local/homebrew
              HOMEBREW_REPOSITORY: /opt/data/.local/homebrew
              PATH: /opt/hermes/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin:/opt/data/.local/go/bin:/opt/data/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              TERM: xterm-256color
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_PORT: &apiPort 8642
              API_SERVER_CORS_ORIGINS: "https://hermes.${LOCAL_DOMAIN}"
              HERMES_DASHBOARD: "true"
              HERMES_DASHBOARD_HOST: "0.0.0.0"
              HERMES_DASHBOARD_PORT: &dashboardPort 9119
              HERMES_DASHBOARD_OIDC_ISSUER: https://sso.${REMOTE_DOMAIN}/application/o/hermes/
              HERMES_DASHBOARD_PUBLIC_URL: https://hermes.${LOCAL_DOMAIN}
              AGENT_BROWSER_ARGS: "--no-sandbox,--disable-dev-shm-usage"
              FIRECRAWL_API_URL: https://api.firecrawl.dev
              SEARXNG_URL: http://searxng.ai.svc.cluster.local:8080
            envFrom:
              - secretRef:
                  name: *app
            ports:
              - name: api
                containerPort: *apiPort
                protocol: TCP
              - name: dashboard
                containerPort: *dashboardPort
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *apiPort
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: [sh, -c, "curl --fail-early -fsS http://127.0.0.1:8642/health http://127.0.0.1:9119/ >/dev/null"]
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: [sh, -c, "curl --fail-early -fsS http://127.0.0.1:8642/health http://127.0.0.1:9119/ >/dev/null"]
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 4Gi
    service:
      app:
        controller: *app
        ports:
          api:
            port: *apiPort
      dashboard:
        controller: *app
        ports:
          http:
            port: 9119

    route:
      app:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Hermes
          gethomepage.dev/description: Personal AI agent dashboard
          gethomepage.dev/group: AI
          gethomepage.dev/icon: https://cdn.jsdelivr.net/npm/@lobehub/icons-static-svg@latest/icons/hermesagent.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=hermes
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - "hermes.${LOCAL_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          hermes:
            app:
              - path: /opt/data
            init-config:
              - path: /opt/data
            install-tools:
              - path: /opt/data

      config-file:
        type: configMap
        name: hermes-config
        advancedMounts:
          hermes:
            init-config:
              - path: /desired/config.yaml
                subPath: config.yaml
                readOnly: true
              - path: /desired/SOUL.md
                subPath: SOUL.md
                readOnly: true

      config-staging:
        type: emptyDir
        advancedMounts:
          hermes:
            init-config:
              - path: /staging

      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          hermes:
            app:
              - path: /dev/shm

      tmpfs:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /tmp
            init-config:
              - path: /tmp
                subPath: init-config
            install-tools:
              - path: /tmp
                subPath: install-tools

    serviceAccount:
      hermes: {}
