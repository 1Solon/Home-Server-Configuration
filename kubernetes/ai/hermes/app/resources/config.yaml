---
model:
  provider: openai-codex
  default: gpt-5.5
  base_url: ""
  api_mode: chat_completions

terminal:
  backend: local
  cwd: /opt/data
  timeout: 180

timezone: "${TZ}"

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

# Let's try this default for a bit before I tinker with auxiliaries
# auxiliary:
#   vision:
#     provider: openrouter
#     model: google/gemini-2.5-flash
#     timeout: 120
#     download_timeout: 30
#   web_extract:
#     provider: openrouter
#     model: google/gemini-2.5-flash
#     timeout: 360
#   compression:
#     provider: openrouter
#     model: google/gemini-3-flash-preview

agent:
  tool_use_enforcement: auto
  gateway_timeout: 1800
  gateway_timeout_warning: 900
  gateway_notify_interval: 180

display:
  streaming: true
  show_reasoning: false
  tool_progress: all
  interim_assistant_messages: true

dashboard:
  theme: mono

human_delay:
  mode: off

memory:
  memory_enabled: true
  user_profile_enabled: true

sessions:
  auto_prune: true
  retention_days: 90
  vacuum_after_prune: true
  min_interval_hours: 24

platform_toolsets:
  cli: [hermes-cli]
