---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 600
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      hermes:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: *app
        initContainers:
          install-tools:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.7.1@sha256:b6c019227889e6675424a2b6223b2cafdd36bf7d1048d1ddd8e043b880d6cc0f
            command:
              - /bin/sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data/.local/bin

                rm -f /opt/data/.local/bin/hermes /opt/data/.local/bin/docker

                if [ ! -f /opt/data/.local/bin/gh ]; then
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /opt/data/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi

                if [ ! -f /opt/data/.local/go/bin/go ]; then
                  rm -rf /opt/data/.local/go
                  cd /tmp
                  curl -fsSL https://go.dev/dl/go1.23.5.linux-amd64.tar.gz -o go.tar.gz
                  tar xzf go.tar.gz
                  mv go /opt/data/.local/
                  rm -rf go.tar.gz
                fi

                if [ ! -f /opt/data/.local/homebrew/bin/brew ]; then
                  export HOMEBREW_PREFIX=/opt/data/.local/homebrew
                  mkdir -p "$HOMEBREW_PREFIX"
                  git clone --depth 1 https://github.com/Homebrew/brew "$HOMEBREW_PREFIX"
                fi
          install-firecrawl-python:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.7.1@sha256:b6c019227889e6675424a2b6223b2cafdd36bf7d1048d1ddd8e043b880d6cc0f
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                if ! PYTHONPATH=/opt/data/python-packages python - <<'PY'; then
                import importlib.util
                raise SystemExit(0 if importlib.util.find_spec("firecrawl") else 1)
                PY
                  uv pip install --target /opt/data/python-packages firecrawl-py==4.17.0
                fi
          init-config:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                umask 077
                mkdir -p /opt/data/workspace
                mkdir -p /opt/data/plugins/agentmemory
                cp /tmp/config.yaml /opt/data/config.yaml
                cp /tmp/SOUL.md /opt/data/SOUL.md
                cp /tmp/agentmemory-plugin-init.py /opt/data/plugins/agentmemory/__init__.py
                cp /tmp/agentmemory-plugin.yaml /opt/data/plugins/agentmemory/plugin.yaml
                touch /opt/data/.env
                sed -i '/^AGENTMEMORY_SECRET=/d' /opt/data/.env
                printf '\nAGENTMEMORY_SECRET=%s\n' "$AGENTMEMORY_SECRET" >> /opt/data/.env
                chown -R 10000:10000 /opt/data/workspace
                chown -R 10000:10000 /opt/data/plugins/agentmemory
                chown 10000:10000 /opt/data/config.yaml /opt/data/SOUL.md /opt/data/.env
            envFrom:
              - secretRef:
                  name: *app
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.7.1@sha256:b6c019227889e6675424a2b6223b2cafdd36bf7d1048d1ddd8e043b880d6cc0f
            args: ["gateway", "run"]
            env:
              TZ: "${TZ}"
              HERMES_HOME: /opt/data
              HOME: /opt/data
              PYTHONPATH: /opt/data/python-packages
              GOPATH: /opt/data/go
              HOMEBREW_CELLAR: /opt/data/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /opt/data/.local/homebrew
              HOMEBREW_REPOSITORY: /opt/data/.local/homebrew
              PATH: /opt/hermes/.venv/bin:/opt/data/.local/bin:/opt/data/.local/go/bin:/opt/data/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_PORT: &apiPort 8642
              API_SERVER_CORS_ORIGINS: "https://hermes.${LOCAL_DOMAIN}"
              AGENTMEMORY_PROJECT: hermes
              AGENTMEMORY_URL: http://agentmemory.ai.svc.cluster.local:3111
              AGENTMEMORY_INJECT_CONTEXT: "true"
              AGENT_BROWSER_ARGS: "--no-sandbox,--disable-dev-shm-usage"
              FIRECRAWL_API_URL: https://api.firecrawl.dev
              SEARXNG_URL: http://searxng.ai.svc.cluster.local:8080
            envFrom:
              - secretRef:
                  name: *app
            ports:
              - name: api
                containerPort: *apiPort
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *apiPort
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *apiPort
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 4Gi
    service:
      app:
        controller: *app
        ports:
          api:
            port: *apiPort

    route:
      app:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - "hermes.${LOCAL_DOMAIN}"
        rules:
          - backendRefs:
              - port: *apiPort
                name: *app

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          hermes:
            app:
              - path: /opt/data
            init-config:
              - path: /opt/data
            install-firecrawl-python:
              - path: /opt/data
            install-tools:
              - path: /opt/data

      config-file:
        type: configMap
        name: hermes-config
        advancedMounts:
          hermes:
            init-config:
              - path: /tmp/config.yaml
                subPath: config.yaml
                readOnly: true
              - path: /tmp/SOUL.md
                subPath: SOUL.md
                readOnly: true
              - path: /tmp/agentmemory-plugin-init.py
                subPath: agentmemory-plugin-init.py
                readOnly: true
              - path: /tmp/agentmemory-plugin.yaml
                subPath: agentmemory-plugin.yaml
                readOnly: true
      python-packages:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /opt/data/python-packages
            install-firecrawl-python:
              - path: /opt/data/python-packages

      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        advancedMounts:
          hermes:
            app:
              - path: /dev/shm

      tmpfs:
        type: emptyDir
        advancedMounts:
          hermes:
            app:
              - path: /tmp
            install-firecrawl-python:
              - path: /tmp
                subPath: install-firecrawl-python
            install-tools:
              - path: /tmp
                subPath: install-tools

    serviceAccount:
      hermes: {}

    rbac:
      roles:
        # Broad read-only cluster access for diagnostics. Secrets are intentionally excluded.
        hermes-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources:
                - configmaps
                - endpoints
                - events
                - limitranges
                - namespaces
                - nodes
                - persistentvolumeclaims
                - persistentvolumes
                - pods
                - pods/log
                - resourcequotas
                - serviceaccounts
                - services
              verbs: &readOnlyVerbs ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources:
                - controllerrevisions
                - daemonsets
                - deployments
                - replicasets
                - statefulsets
              verbs: *readOnlyVerbs
            - apiGroups: ["batch"]
              resources:
                - cronjobs
                - jobs
              verbs: *readOnlyVerbs
            - apiGroups: ["networking.k8s.io"]
              resources:
                - ingressclasses
                - ingresses
                - networkpolicies
              verbs: *readOnlyVerbs
            - apiGroups: ["gateway.networking.k8s.io"]
              resources:
                - gatewayclasses
                - gateways
                - httproutes
                - referencegrants
              verbs: *readOnlyVerbs
            - apiGroups: ["storage.k8s.io"]
              resources:
                - csidrivers
                - csinodes
                - storageclasses
                - volumeattachments
              verbs: *readOnlyVerbs
            - apiGroups: ["autoscaling"]
              resources:
                - horizontalpodautoscalers
              verbs: *readOnlyVerbs
            - apiGroups: ["policy"]
              resources:
                - poddisruptionbudgets
              verbs: *readOnlyVerbs
            - apiGroups: ["coordination.k8s.io"]
              resources:
                - leases
              verbs: *readOnlyVerbs
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources:
                - clusterrolebindings
                - clusterroles
                - rolebindings
                - roles
              verbs: *readOnlyVerbs
            - apiGroups: ["apiextensions.k8s.io"]
              resources:
                - customresourcedefinitions
              verbs: *readOnlyVerbs
            - apiGroups: ["apiregistration.k8s.io"]
              resources:
                - apiservices
              verbs: *readOnlyVerbs
            - apiGroups: ["metrics.k8s.io"]
              resources:
                - nodes
                - pods
              verbs: *readOnlyVerbs
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources:
                - helmreleases
              verbs: *readOnlyVerbs
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources:
                - kustomizations
              verbs: *readOnlyVerbs
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources:
                - buckets
                - gitrepositories
                - helmcharts
                - helmrepositories
                - ocirepositories
              verbs: *readOnlyVerbs
            - apiGroups: ["notification.toolkit.fluxcd.io"]
              resources:
                - alerts
                - providers
                - receivers
              verbs: *readOnlyVerbs
            - apiGroups: ["external-secrets.io"]
              resources:
                - clustersecretstores
                - externalsecrets
                - secretstores
              verbs: *readOnlyVerbs
            - apiGroups: ["monitoring.coreos.com"]
              resources:
                - alertmanagers
                - podmonitors
                - probes
                - prometheuses
                - prometheusrules
                - servicemonitors
                - thanosrulers
              verbs: *readOnlyVerbs
            - apiGroups: ["snapshot.storage.k8s.io"]
              resources:
                - volumesnapshotclasses
                - volumesnapshotcontents
                - volumesnapshots
              verbs: *readOnlyVerbs
            - apiGroups: ["cert-manager.io"]
              resources:
                - certificates
                - certificaterequests
                - clusterissuers
                - issuers
              verbs: *readOnlyVerbs
            - apiGroups: ["acme.cert-manager.io"]
              resources:
                - challenges
                - orders
              verbs: *readOnlyVerbs
            - apiGroups: ["longhorn.io"]
              resources:
                - backups
                - recurringjobs
                - volumes
              verbs: *readOnlyVerbs
            - apiGroups: ["postgresql.cnpg.io"]
              resources:
                - backups
                - clusters
                - poolers
                - scheduledbackups
              verbs: *readOnlyVerbs
            - apiGroups: ["dragonflydb.io"]
              resources:
                - dragonflies
              verbs: *readOnlyVerbs
            - apiGroups: ["tailscale.com"]
              resources:
                - connectors
                - dnsconfigs
                - proxyclasses
                - proxygroups
              verbs: *readOnlyVerbs
            - apiGroups: ["node.k8s.io"]
              resources:
                - runtimeclasses
              verbs: *readOnlyVerbs
      bindings:
        hermes-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-read-all
          subjects:
            - identifier: *app
              serviceAccount: *app
